{% set name = "pyannote.core" %}
{% set version = "6.0.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyannote_core-{{ version }}.tar.gz
  sha256: 61c57f8f5540e3064aa18034f7e2e13efbc253d772b1d7566fc19b1d320222ef

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python >=3.7
  run:
    - matplotlib-base >=2.0.0
    - numpy >=1.10.4
    - pandas >=0.17.1
    - python >=3.7
    - scipy >=1.1
    - simplejson >=3.8.1
    - sortedcontainers >=2.0.4
    - typing-extensions >=3.7.4.1

test:
  imports:
    - pyannote
    - pyannote.core
  commands:
    - pip check
  requires:
    - pip

about:
  home: http://pyannote.github.io/
  summary: Advanced data structures for handling temporal segments with attached labels.
  doc_url: https://pythonhosted.org/pyannote.core/
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - tyrius02
